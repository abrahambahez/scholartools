name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
          - os: ubuntu-22.04
            platform: linux-x86_64
          - os: windows-latest
            platform: windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Extract version (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "LORE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Extract version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = (Select-String -Path pyproject.toml -Pattern '^version = "(.+)"').Matches[0].Groups[1].Value
          echo "LORE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build with PyInstaller
        run: uv run pyinstaller .build/pyinstaller.spec --distpath dist --workpath .build/work --noconfirm

      - name: Zip bundle (Unix)
        if: runner.os != 'Windows'
        run: cd dist && zip ../lore-${{ env.LORE_VERSION }}-${{ matrix.platform }}.zip lore

      - name: Zip bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\lore.exe -DestinationPath lore-${{ env.LORE_VERSION }}-${{ matrix.platform }}.zip

      - name: Upload zip
        uses: softprops/action-gh-release@v2
        with:
          files: lore-${{ env.LORE_VERSION }}-${{ matrix.platform }}.zip

  package-skills:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "LORE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Detect skill changes
        id: skills_check
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV" ]; then
            echo "SKILLS_CHANGED=true" >> $GITHUB_ENV
          elif git diff --quiet "$PREV"..HEAD -- skills/; then
            echo "SKILLS_CHANGED=false" >> $GITHUB_ENV
          else
            echo "SKILLS_CHANGED=true" >> $GITHUB_ENV
          fi

      - name: Package skill zips
        if: env.SKILLS_CHANGED == 'true'
        run: |
          for lang in en es; do
            cd skills/$lang
            zip -r ../../loretools-skills-$lang-${{ env.LORE_VERSION }}.zip */
            cd ../..
          done

      - name: Upload skill zips
        if: env.SKILLS_CHANGED == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: loretools-skills-*-${{ env.LORE_VERSION }}.zip
